services:
  fluxday-db:
    container_name: fluxday-db
    image: postgres:18-alpine
    env_file:
      - db.env
    ports:
      - 5432:5432
    volumes:
      # postgres:18+'s official image stores data under a major-version-
      # specific subdirectory of /var/lib/postgresql (not directly in
      # /var/lib/postgresql/data as on 17 and earlier) -- mount the parent
      # dir per https://github.com/docker-library/postgres/pull/1259.
      - fluxday-db-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  fluxday-app:
    container_name: fluxday-app
    tty: true
    stdin_open: true
    build:
      context: .
      dockerfile: Dockerfile.development
    volumes:
      - .:/share
    env_file:
      - app.env
    depends_on:
      fluxday-db:
        condition: service_healthy
    links:
      - fluxday-db
    ports:
      - 3000:3000

volumes:
  fluxday-db-data:
