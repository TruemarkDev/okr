name: CI

# Dual-boot CI (FastRuby methodology, roadmap Task 2): every push/PR runs the
# Minitest suite twice — once against the current Gemfile (Rails 5.2, promoted
# from Gemfile.next by Task 5; must stay green) and once against Gemfile.next
# (the in-progress next hop target, Rails 6.0 per Task 6, the Zeitwerk
# autoloader rewrite — not yet started and allowed to fail until that hop
# lands).
#
# Both legs boot the app the same way local dev does: Dockerfile.development
# (Ruby 2.4 via the brightbox PPA, bumped from 2.3 as part of roadmap Task 5)
# against a MySQL 5.6 service, matching docker-compose.yml.

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: test (${{ matrix.bundle_gemfile }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - bundle_gemfile: Gemfile
            allow_failure: false
          - bundle_gemfile: Gemfile.next
            allow_failure: true

    services:
      mysql:
        image: mysql:5.6
        env:
          MYSQL_ROOT_PASSWORD: fluxday
          MYSQL_DATABASE: fluxday
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    continue-on-error: ${{ matrix.allow_failure }}

    steps:
      - uses: actions/checkout@v4

      - name: Build app image (Dockerfile.development)
        run: docker build -f Dockerfile.development -t fluxday-ci .

      - name: Bundle install (${{ matrix.bundle_gemfile }})
        run: |
          docker run --rm --network host \
            -v "${{ github.workspace }}:/share" -w /share \
            -e BUNDLE_GEMFILE=${{ matrix.bundle_gemfile }} \
            fluxday-ci bash -lc "bundle install"

      - name: Prepare test database
        run: |
          docker run --rm --network host \
            -v "${{ github.workspace }}:/share" -w /share \
            -e BUNDLE_GEMFILE=${{ matrix.bundle_gemfile }} \
            -e DB_HOST=127.0.0.1 -e DB_USER=root -e DB_PASS=fluxday -e DB_NAME=fluxday \
            fluxday-ci bash -lc "RAILS_ENV=test bundle exec rake db:create db:test:prepare"

      - name: Run test suite
        run: |
          docker run --rm --network host \
            -v "${{ github.workspace }}:/share" -w /share \
            -e BUNDLE_GEMFILE=${{ matrix.bundle_gemfile }} \
            -e DB_HOST=127.0.0.1 -e DB_USER=root -e DB_PASS=fluxday -e DB_NAME=fluxday \
            fluxday-ci bash -lc "bundle exec rake test"
